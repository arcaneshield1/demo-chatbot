services:
  - type: web
    name: acmehelp-demo-chatbot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROQ_API_KEY
        sync: false   # set in Render dashboard; do NOT commit
      - key: DEMO_API_KEY
        sync: false   # set in Render dashboard; generate a random value
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
